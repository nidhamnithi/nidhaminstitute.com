<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Nidham Institute of Kathak</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Forum&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        body {
            margin: 0;
            font-family: 'Forum', serif;
            color: #F6DEBA;
        }

        /* Background */
        .background {
            min-height: 100vh;
            background-image: url("bg1.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* Dark overlay */
        .background::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
        }

        .background > * {
            position: relative;
            z-index: 1;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            align-items: center;
            padding: 20px 40px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-container img {
            height: 45px;
        }

        .logo-container span {
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        /* PAGE HEADER */
        .page-header {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        .page-header h1 {
            font-size: 3rem;
            letter-spacing: 3px;
        }

        /* CONTACT SECTION */
        .contact-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px;
            padding: 40px 20px 80px 20px;
            max-width: 1100px;
            margin: auto;
        }

        .contact-info {
            flex: 1;
            min-width: 280px;
        }

        .contact-info h2 {
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .contact-info p {
            line-height: 1.8;
            margin-bottom: 15px;
        }

        /* FORM */
        .contact-form {
            flex: 1;
            min-width: 280px;
        }

        .contact-form form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 12px;
            background: transparent;
            border: 1px solid #F6DEBA;
            color: #F6DEBA;
            font-family: 'Forum', serif;
            font-size: 1rem;
        }

        .contact-form textarea {
            min-height: 120px;
            resize: vertical;
        }

        .contact-form button {
            padding: 14px;
            background-color: #F6DEBA;
            color: black;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .contact-form button:hover {
            background-color: #e8cfa3;
        }

        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

<div class="background">

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo-container">
            <img src="logo.png" alt="Nidham Logo">
            <span>Nidham Institute of Kathak</span>
        </div>
    </div>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1>Contact Us</h1>
    </div>

    <!-- CONTACT SECTION -->
    <div class="contact-section">

        <!-- CONTACT INFO -->
        <div class="contact-info">
            <h2>Get in Touch</h2>

            <p><strong>Address:</strong><br>
            Nidham Institute of Kathak<br>
            1501 A, 13th St, Anna Nagar,<br>
            Chennai, Tamil Nadu</p>

            <p><strong>Phone:</strong><br>
            +91 93429 09129</p>

            <p><strong>Email:</strong><br>
            info@nidhaminstitute.com</p>
        </div>

        <!-- CONTACT FORM -->
        <div class="contact-form">
            <form action="https://formspree.io/f/YOUR-FORM-ID" method="POST">
    
    <input type="hidden" name="_next" value="https://nidhaminstitute.com/thankyou.html">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>

</form>
        </div>

    </div>

</div>

</body>
</html>
